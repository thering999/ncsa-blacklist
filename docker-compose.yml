services:
  ncsa-blacklist:
    build: .
    platform: linux/amd64
    ports:
      - "3939:3939"
    volumes:
      - ncsa-data:/data
      - ./public:/app/public:ro
      - ./src:/app/src:ro
    environment:
      - PORT=3939
      - DATA_DIR=/data
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - ADMIN_TOKENS=${ADMIN_TOKENS:-}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      - LINE_NOTIFY_TOKEN=${LINE_NOTIFY_TOKEN:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_TO=${SMTP_TO:-}
      - EXTRA_FEEDS=${EXTRA_FEEDS:-}
      - CORS_ORIGIN=${CORS_ORIGIN:-}
      - METRICS_TOKEN=${METRICS_TOKEN:-}
      - ADMIN_ALLOWED_IPS=${ADMIN_ALLOWED_IPS:-}
      - LOG_FORMAT=${LOG_FORMAT:-}
      - RATE_LIMIT=${RATE_LIMIT:-60}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3939/healthz', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  ncsa-blacklist-sync:
    build: .
    platform: linux/amd64
    command: node src/scheduler.js
    volumes:
      - ncsa-data:/data
    environment:
      - DATA_DIR=/data
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      - LINE_NOTIFY_TOKEN=${LINE_NOTIFY_TOKEN:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_TO=${SMTP_TO:-}
      - EXTRA_FEEDS=${EXTRA_FEEDS:-}
    depends_on:
      ncsa-blacklist:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: unless-stopped

volumes:
  ncsa-data:
