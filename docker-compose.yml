services:
  ncsa-blacklist:
    build: .
    ports:
      - "3939:3939"
    volumes:
      - ncsa-data:/data
    environment:
      - PORT=3939
      - DATA_DIR=/data
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - CORS_ORIGIN=${CORS_ORIGIN:-}
    restart: unless-stopped

  ncsa-blacklist-sync:
    build: .
    command: node src/scheduler.js
    volumes:
      - ncsa-data:/data
    environment:
      - DATA_DIR=/data
      - WEBHOOK_URL=${WEBHOOK_URL:-}
    restart: unless-stopped

volumes:
  ncsa-data:
