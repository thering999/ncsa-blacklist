<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ — NCSA SOC Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#e2e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.login-card{background:#1a1f2e;border:1px solid #334155;border-radius:12px;padding:2rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.logo{text-align:center;margin-bottom:1.5rem}
.logo-icon{font-size:3rem;margin-bottom:0.5rem}
.logo h1{font-size:1.25rem;color:#e2e8f0;font-weight:700}
.logo p{font-size:0.8rem;color:#64748b;margin-top:0.25rem}
.form-group{margin-bottom:1rem}
label{display:block;font-size:0.8rem;color:#94a3b8;margin-bottom:0.35rem}
input{width:100%;padding:0.65rem 0.75rem;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:0.9rem;transition:border-color 0.2s}
input:focus{outline:none;border-color:#3b82f6}
.btn{width:100%;padding:0.75rem;background:#2563eb;color:#fff;border:none;border-radius:6px;font-size:0.95rem;font-weight:600;cursor:pointer;transition:background 0.2s;margin-top:0.5rem}
.btn:hover{background:#1d4ed8}
.btn:disabled{background:#374151;cursor:not-allowed}
.error{background:#7f1d1d;color:#fca5a5;padding:0.65rem 0.75rem;border-radius:6px;font-size:0.85rem;margin-bottom:1rem;display:none}
.footer{text-align:center;margin-top:1.5rem;font-size:0.72rem;color:#475569;line-height:1.6}
.spinner{display:none;width:16px;height:16px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:middle;margin-right:0.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <div class="logo-icon">🛡</div>
    <h1>NCSA SOC Dashboard</h1>
    <p>กลุ่มงานสุขภาพดิจิทัล สสจ.มุกดาหาร</p>
  </div>

  <div class="error" id="error-msg"></div>

  <form onsubmit="doLogin(event)">
    <div class="form-group">
      <label for="username">ชื่อผู้ใช้</label>
      <input type="text" id="username" autocomplete="username" autofocus required placeholder="username">
    </div>
    <div class="form-group">
      <label for="password">รหัสผ่าน</label>
      <input type="password" id="password" autocomplete="current-password" required placeholder="••••••••">
    </div>
    <button type="submit" class="btn" id="login-btn">เข้าสู่ระบบ</button>
  </form>

  <div class="footer">
    NCSA Blacklist Open Data (CC0) · MIT License<br>
    พัฒนาต่อยอดโดย กลุ่มงานสุขภาพดิจิทัล สสจ.มุกดาหาร<br>
    <span style="color:#1e293b">ไม่ใช่ผลิตภัณฑ์ของ สกมช.</span>
  </div>
</div>

<script>
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('error-msg');
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>กำลังเข้าสู่ระบบ...';
  err.style.display = 'none';

  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password}),
      credentials: 'same-origin'
    });
    const data = await res.json();
    if (res.ok) {
      if (data.token) localStorage.setItem('sessionToken', data.token);
      if (data.username) localStorage.setItem('sessionUser', data.username);
      if (data.role) localStorage.setItem('sessionRole', data.role);
      window.location.href = '/';
    } else {
      err.textContent = data.error || 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'เข้าสู่ระบบ';
    }
  } catch (ex) {
    err.textContent = 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้: ' + ex.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'เข้าสู่ระบบ';
  }
}

// Check if already logged in
fetch('/auth/me', {credentials: 'same-origin'})
  .then(r => r.ok ? window.location.href = '/' : null)
  .catch(() => {});
</script>
</body>
</html>
